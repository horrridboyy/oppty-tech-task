<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic signals</title>
  </head>
  <body>
    <script>
      let signal = "Red";

      if (signal == "Red") {
        console.log("Stop Immediately");
      } else if (signal == "Yellow") {
        console.log("Slow down and prepare to stop");
      } else if (signal == "Green") {
        console.log("Go Safely");
      } else {
        console.log("Invalid Signal");
      }
    </script>
  </body>
</html>
