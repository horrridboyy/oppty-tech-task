<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let monthNumber = 7;

switch (monthNumber) {
    case 1:
    case 2:
    case 10:
    case 11:
    case 12:
        console.log("Winter Season");
        break;

    case 3:
    case 4:
    case 5:
        console.log("Summer Season");
        break;

    case 6:
    case 7:
    case 8:
    case 9:
        console.log("Rainy Season");
        break;

    default:
        console.log("Invalid Month Number");
}
    </script>
</body>
</html>
