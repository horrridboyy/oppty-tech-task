<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Pizza Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

        <h1>🍕 Smart Pizza Builder</h1>

        <div class="card">

            <label>Crust</label>

            <select id="crust" onchange="calculate()">
                <option value="8">Thin - $8</option>
                <option value="10">Regular - $10</option>
                <option value="12">Stuffed - $12</option>
            </select>

        </div>

        <div class="card">

            <label>Size</label>

            <div class="sizes">

                <button onclick="setSize('Small',0,this)">Small</button>
                <button onclick="setSize('Medium',2,this)">Medium</button>
                <button onclick="setSize('Large',4,this)">Large</button>

            </div>

        </div>

        <div class="card">

            <label>Toppings ($0.50 each)</label>

            <div class="tops">

                <label><input type="checkbox" class="top" onchange="calculate()"> Cheese</label>
                <label><input type="checkbox" class="top" onchange="calculate()"> Mushrooms</label>
                <label><input type="checkbox" class="top" onchange="calculate()"> Peppers</label>
                <label><input type="checkbox" class="top" onchange="calculate()"> Pepperoni</label>
                <label><input type="checkbox" class="top" onchange="calculate()"> Chicken</label>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="receipt">

            <h2>Your Receipt</h2>

            <h3 id="pizzaName">Small Thin Pizza</h3>

            <div class="row">
                <span>Base</span>
                <span>$<span id="base">8.00</span></span>
            </div>

            <div class="row">
                <span>Toppings</span>
                <span>$<span id="topPrice">0.00</span></span>
            </div>

            <div class="row">
                <span>Subtotal</span>
                <span>$<span id="subtotal">8.00</span></span>
            </div>

            <div class="row">
                <span>Discount (10%)</span>
                <span>$<span id="discount">0.00</span></span>
            </div>

            <div class="total">
                <span>Total</span>
                <span>$<span id="total">7.20</span></span>
            </div>

            <button class="order">Place Order</button>

        </div>

    </div>

</div>

<script src="file.js"></script>

</body>
</html>
